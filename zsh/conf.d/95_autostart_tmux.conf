# ============================================
# Auto-start tmux (only in standalone terminals)
# ============================================
# Skip IDE terminals (VSCode / JetBrains) and non-TTY contexts.
if [[ -o interactive ]] \
  && [[ -t 1 ]] \
  && [[ -z "$TMUX" ]] \
  && [[ "$TERM_PROGRAM" != "vscode" ]] \
  && [[ "$VSCODE_INJECTION" != "1" ]] \
  && [[ -z "$VSCODE_GIT_IPC_HANDLE" ]] \
  && [[ "$TERMINAL_EMULATOR" != "JetBrains-JediTerm" ]] \
  && [[ -z "$JETBRAINS_IDE" ]] \
  && [[ -z "$INTELLIJ_ENVIRONMENT_READER" ]]; then

  # SSH login: attach only, do NOT auto-create a new session.
  if [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" || -n "$SSH_TTY" ]]; then
    if tmux has-session -t 1__main 2>/dev/null; then
      exec tmux attach-session -t 1__main
    elif tmux has-session -t main 2>/dev/null; then
      exec tmux attach-session -t main
    elif tmux ls >/dev/null 2>&1; then
      exec tmux attach-session
    fi
  else
    # Local terminal: create-or-attach main session.
    exec tmux new-session -A -s main
  fi
fi

# ============================================================
# Personal workflow aliases
# ============================================================

alias nvimrc='nvim ~/.config/nvim/init.lua'

run_user_script() {
  local script_name="$1"
  shift

  if [[ -n "${SCRIPTS_DIR:-}" && -x "${SCRIPTS_DIR}/${script_name}" ]]; then
    "${SCRIPTS_DIR}/${script_name}" "$@"
    return $?
  fi

  if command -v "$script_name" >/dev/null 2>&1; then
    "$script_name" "$@"
    return $?
  fi

  echo "script not found: $script_name (SCRIPTS_DIR=${SCRIPTS_DIR:-unset})"
  return 127
}

jl() {
  run_user_script launch_jupyter_lab.sh "$@"
}

jtext() {
  run_user_script jtext "$@"
}

chat() {
  run_user_script launch_codex.sh "$@"
}

# 参数化命令用 function，不用 alias
unalias cs61b 2>/dev/null
cs61b() {
  if [[ $# -ne 1 ]]; then
    echo "Usage: cs61b <name>"
    return 1
  fi

  local name="$1"
  local project_dir="$PWD/$name"

  if [[ -e "$project_dir" ]]; then
    echo "cs61b: already exists: $project_dir"
    return 1
  fi

  mkdir -p "$project_dir/src" "$project_dir/out" "$project_dir/tests" || return $?
  : > "$project_dir/.cs61b-root" || return $?

  echo "cs61b: created $project_dir"
}

tmuxclean() {
  if [[ -z "${TMUX:-}" ]]; then
    echo "tmuxclean: run this inside tmux"
    return 1
  fi

  bash "$HOME/.config/tmux/scripts/tmux_clean.sh"
}

# iPad SSH quick mode for tmux (lower flicker)
ipad() {
  run_user_script tmux_ipad_mode.sh off
}

ipad_restore() {
  run_user_script tmux_ipad_mode.sh on
}

ipad_status() {
  run_user_script tmux_ipad_mode.sh status
}

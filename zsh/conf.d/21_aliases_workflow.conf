# ============================================================
# Personal workflow aliases
# ============================================================

alias nvimrc='nvim ~/.config/nvim/init.lua'
alias jl='bash ~/scripts/launch_jupyter_lab.sh'
alias jtext='bash ~/scripts/jtext'
alias chat='bash ~/scripts/launch_codex.sh'

# 参数化命令用 function，不用 alias
unalias cs61b 2>/dev/null
cs61b() {
  if [[ $# -ne 1 ]]; then
    echo "Usage: cs61b <name>"
    return 1
  fi

  local name="$1"
  local project_dir="$PWD/$name"

  if [[ -e "$project_dir" ]]; then
    echo "cs61b: already exists: $project_dir"
    return 1
  fi

  mkdir -p "$project_dir/src" "$project_dir/out" "$project_dir/tests" || return $?
  : > "$project_dir/.cs61b-root" || return $?

  echo "cs61b: created $project_dir"
}

tmuxclean() {
  if [[ -z "${TMUX:-}" ]]; then
    echo "tmuxclean: run this inside tmux"
    return 1
  fi

  bash "$HOME/.config/tmux/scripts/tmux_clean.sh"
}

# iPad SSH quick mode for tmux (lower flicker)
alias ipad='~/dotfiles/scripts/tmux_ipad_mode.sh off'
alias ipad_restore='~/dotfiles/scripts/tmux_ipad_mode.sh on'
alias ipad_status='~/dotfiles/scripts/tmux_ipad_mode.sh status'

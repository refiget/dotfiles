# ============================================================
# Personal workflow aliases
# ============================================================

# scripts/ is exported into PATH in 02_path_env.conf for direct use,
# but these wrappers call the repo-local helpers explicitly.
__run_dotfiles_helper() {
  local helper_name="$1"
  local label="$2"
  shift 2

  local helper_root="${SCRIPTS_DIR:-${DOTFILES_DIR:-$HOME/dotfiles}/scripts}"
  local helper="$helper_root/$helper_name"

  if [[ ! -x "$helper" ]]; then
    echo "$label: missing helper: $helper"
    return 127
  fi

  "$helper" "$@"
}

# 参数化命令用 function，不用 alias
unalias jl cs61b ipad ipad_restore ipad_status 2>/dev/null
jl() {
  __run_dotfiles_helper launch_jupyter_lab jl "$@"
}

cs61b() {
  if [[ $# -ne 1 ]]; then
    echo "Usage: cs61b <name>"
    return 1
  fi

  local name="$1"
  local project_dir="$PWD/$name"

  if [[ -e "$project_dir" ]]; then
    echo "cs61b: already exists: $project_dir"
    return 1
  fi

  mkdir -p "$project_dir/src" "$project_dir/out" "$project_dir/tests" || return $?
  : > "$project_dir/.cs61b-root" || return $?

  echo "cs61b: created $project_dir"
}

tmuxclean() {
  if [[ -z "${TMUX:-}" ]]; then
    echo "tmuxclean: run this inside tmux"
    return 1
  fi

  bash "$HOME/.config/tmux/scripts/tmux_clean.sh" || return $?
  python3 "$HOME/.config/tmux/scripts/session_manager.py" ensure
}

# iPad SSH quick mode for tmux (lower flicker)
ipad() {
  __run_dotfiles_helper tmux_ipad_mode ipad off
}

ipad_restore() {
  __run_dotfiles_helper tmux_ipad_mode ipad_restore on
}

ipad_status() {
  __run_dotfiles_helper tmux_ipad_mode ipad_status status
}

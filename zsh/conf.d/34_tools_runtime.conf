# ============================================================
# Runtime helpers: nvm / virtualenv shortcuts
# ============================================================

# lazy nvm
export NVM_DIR="$HOME/.nvm"
lazy_nvm() {
  unset -f node npm nvm opencode
  [[ -s "$NVM_DIR/nvm.sh" ]] && source "$NVM_DIR/nvm.sh"
}
node() { lazy_nvm; node "$@"; }
npm() { lazy_nvm; npm "$@"; }
nvm() { lazy_nvm; nvm "$@"; }
opencode() { lazy_nvm; opencode "$@"; }

# direnv integration
if command -v direnv >/dev/null 2>&1; then
  eval "$(direnv hook zsh)"
fi

# ============================================================
# Keybindings
# ============================================================
bindkey -v

# Final Ctrl-R policy: keep Atuin when available, otherwise use native zsh history search.
if [[ "${__ZSH_CTRL_R_BACKEND:-native}" == "atuin" ]] && [[ -n "${__ZSH_CTRL_R_WIDGET:-}" ]]; then
  bindkey -M main '^R' "$__ZSH_CTRL_R_WIDGET"
  bindkey -M emacs '^R' "$__ZSH_CTRL_R_WIDGET"
  bindkey -M viins '^R' "$__ZSH_CTRL_R_WIDGET"
else
  bindkey -M main '^R' history-incremental-search-backward
  bindkey -M emacs '^R' history-incremental-search-backward
  bindkey -M viins '^R' history-incremental-search-backward
fi

bindkey '^[[H' beginning-of-line
bindkey '^[[F' end-of-line
bindkey '^[[1~' beginning-of-line
bindkey '^[[4~' end-of-line

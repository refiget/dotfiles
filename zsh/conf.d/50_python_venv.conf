# ============================================================
# Python venv + direnv helpers
#   mkvenv <name>  -> create ~/venvs/<name>
#   venv <name>    -> ensure .envrc in current dir, allow direnv
# ============================================================

# One place to change interpreter (default: python3.11)
export VENV_PYTHON="${VENV_PYTHON:-python3.11}"
export VENV_HOME="${VENV_HOME:-$HOME/venvs}"

[[ -d "$VENV_HOME" ]] || mkdir -p "$VENV_HOME"

__venv_abs_path() {
  # Cross-mac compatible absolute-path resolver (realpath is not guaranteed).
  # Usage: __venv_abs_path <path>
  local target="$1"

  if command -v python3 >/dev/null 2>&1; then
    python3 - <<'PY' "$target"
import os, sys
print(os.path.abspath(sys.argv[1]))
PY
    return 0
  fi

  # Fallback: directory + basename using pwd -P
  local dir base
  dir="$(cd "${target:h}" 2>/dev/null && pwd -P)" || return 1
  base="${target:t}"
  print -r -- "$dir/$base"
}

mkvenv() {
  if [[ $# -ne 1 ]]; then
    echo "Usage: mkvenv <name>"
    return 1
  fi

  local name="$1"
  local venv_dir="$VENV_HOME/$name"

  if [[ -d "$venv_dir" && -f "$venv_dir/bin/activate" ]]; then
    echo "mkvenv: already exists: $venv_dir"
    return 0
  fi

  "$VENV_PYTHON" -m venv "$venv_dir" || return $?
  echo "mkvenv: created $venv_dir (python: $VENV_PYTHON)"
}

venv() {
  if [[ $# -ne 1 ]]; then
    echo "Usage: venv <name>"
    return 1
  fi

  local name="$1"
  local venv_dir="$VENV_HOME/$name"
  local activate="$venv_dir/bin/activate"
  local envrc="$PWD/.envrc"
  local abs_venv

  if [[ ! -f "$activate" ]]; then
    echo "venv: not found: $venv_dir"
    echo "Try: mkvenv $name"
    return 1
  fi

  abs_venv="$(__venv_abs_path "$venv_dir")" || {
    echo "venv: failed to resolve absolute path for $venv_dir"
    return 1
  }

  if [[ ! -f "$envrc" ]]; then
    cat > "$envrc" <<ENVRC_EOF
export VIRTUAL_ENV="$abs_venv"
PATH_add "\$VIRTUAL_ENV/bin"
ENVRC_EOF
    echo "venv: created $envrc"
  else
    echo "venv: found existing $envrc"
  fi

  if command -v direnv >/dev/null 2>&1; then
    direnv allow . || return $?
    echo "venv: direnv allowed for $PWD"

    # Trigger immediate load in current shell when possible.
    eval "$(direnv export zsh)"
  else
    echo "venv: direnv not found; install direnv or source $activate manually"
    return 1
  fi
}

# ============================================================
# PATH and tool environment
# ============================================================

typeset -U path PATH
path=(
  "$HOME/.local/bin"
  "/opt/homebrew/bin"
  "/opt/homebrew/sbin"
  "/usr/local/bin"
  "/usr/local/sbin"
  "/usr/bin"
  "/bin"
  "/usr/sbin"
  "/sbin"
  $path
)

if command -v brew >/dev/null 2>&1; then
  eval "$(brew shellenv)"
fi

# Tool-specific paths
path=(
  "$HOME/.opencode/bin"
  "$HOME/Library/pnpm"
  $path
)

export PNPM_HOME="$HOME/Library/pnpm"

# ============================================================
# PATH and tool environment
# ============================================================

typeset -U path PATH
path=(
  "$HOME/.local/bin"
  "/opt/homebrew/bin"
  "/opt/homebrew/sbin"
  "/usr/local/bin"
  "/usr/local/sbin"
  "/usr/bin"
  "/bin"
  "/usr/sbin"
  "/sbin"
  $path
)

if command -v brew >/dev/null 2>&1; then
  eval "$(brew shellenv)"
fi

# Tool-specific paths
path=(
  "$HOME/.opencode/bin"
  "$HOME/Library/pnpm"
  $path
)

# Dotfiles scripts (exported for reuse in aliases/functions)
if [[ -n "${DOTFILES_DIR:-}" && -d "$DOTFILES_DIR/scripts" ]]; then
  export SCRIPTS_DIR="$DOTFILES_DIR/scripts"
elif [[ -d "$HOME/scripts" ]]; then
  export SCRIPTS_DIR="$HOME/scripts"
fi

if [[ -n "${SCRIPTS_DIR:-}" ]]; then
  path=("$SCRIPTS_DIR" $path)
fi

export PNPM_HOME="$HOME/Library/pnpm"

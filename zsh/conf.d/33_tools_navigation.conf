# ============================================================
# Navigation and search tools: yazi / zoxide / fzf
# ============================================================

# yazi: quit后自动 cd 到最后目录
y() {
  local tmp cwd
  tmp="$(mktemp -t yazi-cwd.XXXXXX)" || return
  command yazi --cwd-file="$tmp" "$@"
  [[ -s "$tmp" ]] && cwd="$(<"$tmp")"
  rm -f -- "$tmp"
  [[ -n "${cwd:-}" && "$cwd" != "$PWD" ]] && builtin cd -- "$cwd"
}

# zoxide + fzf
if command -v zoxide >/dev/null 2>&1; then
  export _ZO_FZF_OPTS=${_ZO_FZF_OPTS:-'--height=40% --layout=reverse --border=rounded --border-label=" zoxide " --margin=1 --padding=1 --prompt=" " --pointer="▌" --info=inline-right --no-separator --cycle --no-scrollbar --bind=tab:down,ctrl-i:down,btab:up'}

  eval "$(zoxide init zsh)"

  # z => 交互选择, Z => 原始快速跳转
  if (( $+functions[z] )); then
    __zoxide_z_swapped() { __zoxide_z "$@"; }
    z() { zi "$@"; }
    Z() { __zoxide_z_swapped "$@"; }
  fi

  alias za='zoxide add $(pwd)'
  alias zl='zoxide query -l'
  alias zf='zoxide query'
fi

# fzf: source exactly one provider in priority order.
typeset __fzf_provider=""
typeset __fzf_prefix=""
typeset __fzf_dir=""

if [[ -f ~/.fzf.zsh ]]; then
  __fzf_provider="user"
  source ~/.fzf.zsh
else
  if command -v brew >/dev/null 2>&1; then
    __fzf_prefix="$(brew --prefix fzf 2>/dev/null)"
    if [[ -n "$__fzf_prefix" && -d "$__fzf_prefix/shell" ]]; then
      __fzf_provider="homebrew"
      __fzf_dir="$__fzf_prefix/shell"
    fi
  fi

  if [[ -z "$__fzf_provider" && -d /usr/share/doc/fzf/examples ]]; then
    __fzf_provider="system"
    __fzf_dir="/usr/share/doc/fzf/examples"
  fi

  if [[ -n "$__fzf_dir" ]]; then
    [[ -f "$__fzf_dir/completion.zsh" ]] && source "$__fzf_dir/completion.zsh"
    if [[ -t 0 && -t 1 ]]; then
      [[ -f "$__fzf_dir/key-bindings.zsh" ]] && source "$__fzf_dir/key-bindings.zsh"
    fi
  fi
fi

unset __fzf_provider __fzf_prefix __fzf_dir

export FZF_IGNORE_FILE="$HOME/.ignore"
export FZF_DEFAULT_COMMAND='fd --type f --hidden --follow --strip-cwd-prefix --ignore-file "$FZF_IGNORE_FILE" --exclude .git'
export FZF_CTRL_T_COMMAND="$FZF_DEFAULT_COMMAND"
export FZF_ALT_C_COMMAND='fd --type d --hidden --follow --strip-cwd-prefix --ignore-file "$FZF_IGNORE_FILE" --exclude .git'

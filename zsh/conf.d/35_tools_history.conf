# ============================================================
# History helpers: atuin
# ============================================================

typeset -g __ZSH_CTRL_R_BACKEND="native"
typeset -g __ZSH_CTRL_R_WIDGET="history-incremental-search-backward"

if command -v atuin >/dev/null 2>&1; then
  eval "$(atuin init zsh --disable-up-arrow)"

  typeset __zsh_ctrl_r_binding
  __zsh_ctrl_r_binding="$(bindkey '^R' 2>/dev/null)"
  if [[ "$__zsh_ctrl_r_binding" == *'"^R" '* ]]; then
    __ZSH_CTRL_R_WIDGET="${__zsh_ctrl_r_binding##* }"
    if [[ -n "$__ZSH_CTRL_R_WIDGET" ]] \
      && [[ "$__ZSH_CTRL_R_WIDGET" != "history-incremental-search-backward" ]] \
      && [[ "$__ZSH_CTRL_R_WIDGET" != "undefined-key" ]] \
      && [[ "$__ZSH_CTRL_R_WIDGET" != "redisplay" ]]; then
      __ZSH_CTRL_R_BACKEND="atuin"
    else
      __ZSH_CTRL_R_WIDGET="history-incremental-search-backward"
    fi
  fi
  unset __zsh_ctrl_r_binding
fi

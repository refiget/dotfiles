# ============================================
# Auto-start tmux (only in standalone terminals)
# ============================================
# Skip IDE terminals (VSCode / JetBrains) and non-TTY contexts.
if [[ -o interactive ]] \
  && [[ -t 1 ]] \
  && [[ -z "$TMUX" ]] \
  && [[ "$TERM_PROGRAM" != "vscode" ]] \
  && [[ "$VSCODE_INJECTION" != "1" ]] \
  && [[ -z "$VSCODE_GIT_IPC_HANDLE" ]] \
  && [[ "$TERMINAL_EMULATOR" != "JetBrains-JediTerm" ]] \
  && [[ -z "$JETBRAINS_IDE" ]] \
  && [[ -z "$INTELLIJ_ENVIRONMENT_READER" ]]; then
  exec tmux new-session -A -s main
fi

# ============================================================
# local pre-overrides (optional)
# ============================================================
# Machine-local tweaks that must run BEFORE 90/95 modules.
# Put startup control flags here when later modules need to read them, e.g.:
#   export ZSH_SKIP_DEP_CHECKS=1
#   export ZSH_SKIP_TMUX_AUTOSTART=1
[[ -f ~/.zshrc.pre.local ]] && source ~/.zshrc.pre.local

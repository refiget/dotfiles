# Alacritty config (migrated from kitty profile)
# Strategy: migrate all compatible settings; keep tmux as primary multiplexer UI.

[general]
live_config_reload = true
working_directory = "None"
import = [
  "~/.config/alacritty/current-theme.toml",
]

[env]
TERM = "xterm-256color"

[window]
# kitty: hide_window_decorations titlebar-only (closest on macOS is Transparent)
decorations = "Transparent"
dynamic_title = false
title = ""
padding = { x = 10, y = 10 }
dimensions = { columns = 140, lines = 36 }
option_as_alt = "Both"

[scrolling]
history = 10000
multiplier = 5

[font]
size = 18.5
builtin_box_drawing = true
offset = { x = 0, y = 1 }

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

# kitty disabled italic styles; match with Regular/Bold fallback.
[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[cursor]
style = { shape = "Beam", blinking = "Off" }
blink_interval = 450

[selection]
save_to_clipboard = true

[bell]
animation = "EaseOutExpo"
duration = 0

# Compatibility notes:
# - kitty symbol_map (CJK/Emoji fine-grained mapping): no 1:1 equivalent in Alacritty.
# - kitty cursor_trail animation: no equivalent.
# - kitty tabs: intentionally omitted (tmux manages sessions/windows).


# Fallback Meta mappings for tmux/nvim when macOS Option handling is flaky.
# Keep this minimal to avoid overriding normal key behavior.
[[keyboard.bindings]]
key = "H"
mods = "Alt"
chars = "\u001bh"

[[keyboard.bindings]]
key = "J"
mods = "Alt"
chars = "\u001bj"

[[keyboard.bindings]]
key = "K"
mods = "Alt"
chars = "\u001bk"

[[keyboard.bindings]]
key = "L"
mods = "Alt"
chars = "\u001bl"

[[keyboard.bindings]]
key = "B"
mods = "Alt"
chars = "\u001bb"

[[keyboard.bindings]]
key = "F"
mods = "Alt"
chars = "\u001bf"

[[keyboard.bindings]]
key = "Back"
mods = "Alt"
chars = "\u0017"


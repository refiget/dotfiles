patch:
  style/color_scheme: blue_reverie
  style/color_scheme_dark: blue_reverie_dark
  style/status_message_type: mix
  style/candidate_format: '[label]. [candidate] [comment]'
  style/text_orientation: horizontal
  style/inline_preedit: true
  style/inline_candidate: false
  style/translucency: true
  style/blur: true
  style/mutual_exclusive: false
  style/memorize_size: true
  style/show_paging: false
  style/alpha: 1.0
  style/candidate_list_layout: linear
  style/corner_radius: 12
  style/hilited_corner_radius: 10
  style/border_height: 0
  style/border_width: 6
  style/line_spacing: 5
  style/spacing: 8
  style/shadow_size: 6
  style/font_face: PingFangSC-Regular
  style/font_point: 16

  preset_color_schemes/blue_reverie:
    name: "Blue Reverie"
    author: HunterJi
    color_space: srgb
    back_color: 0xFFFFFF
    hilited_back_color: 0x252320
    hilited_candidate_back_color: 0xFF7A00
    text_color: 0xD8000000
    hilited_text_color: 0xDEDDDD
    candidate_text_color: 0x5E5E5E
    hilited_candidate_text_color: 0xFFFFFF
    label_color: 0x888785
    hilited_candidate_label_color: 0xFFFFFF
    comment_text_color: 0xDEDDDD

  preset_color_schemes/blue_reverie_dark:
    name: "Blue Reverie Dark"
    author: HunterJi
    color_space: srgb
    back_color: 0x3F000000
    hilited_back_color: 0x252320
    hilited_candidate_back_color: 0xFF7A00
    text_color: 0xD8000000
    hilited_text_color: 0xDEDDDD
    candidate_text_color: 0xFFFFFF
    hilited_candidate_text_color: 0xFFFFFF
    label_color: 0xEBEBEB
    hilited_candidate_label_color: 0xFFFFFF
    comment_text_color: 0xDEDDDD

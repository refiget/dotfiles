patch:
  switches/@2/reset: 0
  traditionalize/opencc_config: t2s.json

  # in / ing 双向模糊
  speller/algebra/+:
    - derive/in$/ing/
    - derive/ing$/in/

  # 方案级 editor 仅保留基础键位，放行 Ctrl/Alt 组合给系统/应用
  editor/bindings:
    space: confirm
    Return: commit_raw_input
    BackSpace: revert
    Delete: delete
    Escape: cancel

  # 中英混输权重：中文优先，英文次之
  translator/initial_quality: 1.2
  melt_eng/initial_quality: 1.1
  melt_eng/enable_sentence: false
  melt_eng/enable_user_dict: false

  # 降低部分短英文单词，避免压过常用中文词
  reduce_english_filter/idx: 2
  reduce_english_filter/words:
    - rug
    - bus
    - ship

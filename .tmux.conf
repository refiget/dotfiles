# ============================================================
# 1. 基础通用设置
# ============================================================
unbind C-b
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g mouse on
set -g mode-keys vi
setw -g aggressive-resize on
set -g status-right ""

# 依赖自检（保守提示，不改原有 UI）
if-shell 'test ! -d "$HOME/.tmux/plugins/tpm"' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"' \
  ''

if-shell '! command -v fzf >/dev/null 2>&1' \
  'display-message "tmux: fzf 未安装，Session 弹窗跳转不可用（Arch: pacman -S fzf；macOS: brew install fzf）"' \
  ''


# --- 视觉设置 ---
set -g status-left-length 120
set -g status-right-length 100
set -g window-status-style "fg=#6272a4"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style "fg=#44475a"
set -g message-style "bg=#ffb86c,fg=#282a36"
set -g status-interval 5

# 读取本地状态栏颜色（由 deploy.sh 生成）
if-shell "test -f $HOME/.config/tmux/local-status.conf" "source-file $HOME/.config/tmux/local-status.conf"
set -g status-style "bg=#{?@status_bg,#{@status_bg},default},fg=#c5c8c6"

# 默认简洁栏（云端等场景），本地 macOS 会在条件块内覆盖为参考外观
set -g status-left " #S "
set -g status-right ""

# --- 窗口/分屏按键绑定 ---
bind-key | split-window -h
bind-key - split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -n Left  resize-pane -L 5
bind-key -n Right resize-pane -R 5
bind-key -n Up    resize-pane -U 5
bind-key -n Down  resize-pane -D 5
bind-key -r Left  resize-pane -L 5
bind-key -r Right resize-pane -R 5
bind-key -r Up    resize-pane -U 5
bind-key -r Down  resize-pane -D 5

# ============================================================
# 🚀 Session 管理优化 (FZF + 智能切换)
# ============================================================

# 1. 清理旧键位 (防止冲突)
unbind n
unbind y
unbind b

# 2. 快速切换 (Alt-Tab 体验)
# 作用：在"当前"和"上一个" Session 之间反复横跳
bind-key Tab switch-client -l

# 3. 新建 Session
# 作用：提示输入名字，然后创建
bind-key n command-prompt -p "New Session:" "new-session -A -s '%%'"

# 4. FZF 模糊搜索 (核心大招)
# 作用：弹出浮窗，列出所有 Session，支持预览，回车跳转
# 依赖：系统需安装 fzf
if-shell 'command -v fzf >/dev/null 2>&1' "bind-key s display-popup -E -w 80% -h 70% \"\\
    tmux list-sessions -F '#{session_name}' | \\\n+    fzf --reverse --header 'Jump to Session' --preview 'tmux capture-pane -pt {}' | \\\n+    xargs tmux switch-client -t\" " \
    "bind-key s display-message 'fzf 未安装：Session 跳转不可用（Arch: pacman -S fzf；macOS: brew install fzf）'"

# 5. 杀掉 Session (大写 X)
if-shell 'command -v fzf >/dev/null 2>&1' "bind-key X display-popup -E \"\\
    tmux list-sessions -F '#{session_name}' | \\\n+    fzf --reverse --header 'Kill Session' | \\\n+    xargs tmux kill-session -t\" " \
    "bind-key X display-message 'fzf 未安装：Session 关闭不可用（Arch: pacman -S fzf；macOS: brew install fzf）'"

# --- 小写 x：选择会话并 kill （覆盖默认 kill-pane）
unbind x
if-shell 'command -v fzf >/dev/null 2>&1' "bind-key x display-popup -E \"\\
    tmux list-sessions -F '#{session_name}' | \\\n+    fzf --reverse --header 'Kill Session' | \\\n+    xargs tmux kill-session -t\" " \
    "bind-key x display-message 'fzf 未安装：Session 关闭不可用（Arch: pacman -S fzf；macOS: brew install fzf）'"
# ============================================================
# 3. 复制模式优化
# ============================================================

# 基础选择模式
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line

# --- 快速翻页 ---
bind-key -T copy-mode-vi K send-keys -X cursor-up 5
bind-key -T copy-mode-vi J send-keys -X cursor-down 5
bind-key -T copy-mode-vi E send-keys -X cancel
bind-key -T copy-mode-vi H send-keys -X top-line
bind-key -T copy-mode-vi L send-keys -X bottom-line

# ============================================================
# 4. 差异化设置 (Mac/Linux 分离)
# ============================================================

# 🍎 macOS (本地 - Purple Theme)
if-shell "uname | grep -q Darwin" {
    # Prefix 使用 C-q（避免与 macOS 冲突）
    set -g prefix C-q
    bind-key C-q send-prefix

    # Mac 支持原生 clipboard（pbcopy/pbpaste）
    set -s set-clipboard on
    set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

    # Copy mode → 全部复制到 macOS 剪贴板
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"

    # 保持原有标签高亮颜色
    set -g window-status-current-style "fg=#bd93f9,bold"

    # 设置主题色为原始配色，供状态栏/边框使用
    set-environment -g TMUX_THEME_COLOR "#bd93f9"

    # 本地启用参考风格状态栏
    set -g status-style "bg=#{?@status_bg,#{@status_bg},default},fg=#f8f8f2"
    set -g status-left "#(bash #{HOME}/scripts/tmux-status/left.sh '#{session_id}' '#{session_name}')"
    set -g status-right "#(bash #{HOME}/scripts/tmux-status/right.sh)"
    run-shell -b "bash #{HOME}/scripts/tmux-status/update_theme_color.sh"
    set-hook -g session-created 'run-shell -b "bash #{HOME}/scripts/tmux-status/update_theme_color.sh"'
    set-hook -g client-attached 'run-shell -b "bash #{HOME}/scripts/tmux-status/update_theme_color.sh"'

    if-shell "[ -d ~/.tmux/plugins/tpm ]" 'run-shell "~/.tmux/plugins/tpm/tpm"'
}

# 🐧 Linux Server (云端 - Blue Dracula Theme)
if-shell "uname | grep -q Linux" {
    set -g prefix C-e
    bind-key C-e send-prefix
    set -s set-clipboard on
    set -as terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

    # Linux OSC52 强力复制
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
        'base64 -w0 | sed -e "s/^/\x1b]52;c;/" -e "s/$/\x07/" > /dev/tty'
    bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel \
        'base64 -w0 | sed -e "s/^/\x1b]52;c;/" -e "s/$/\x07/" > /dev/tty'

    # 保持原有标签高亮颜色
    set -g window-status-current-style "bg=#8be9fd,fg=#282a36,bold"

    # 云端保持简洁栏
    set -g status-style "bg=#44475a,fg=#f8f8f2"
    set -g status-left "#[bg=#8be9fd,fg=#282a36,bold] #S (CLOUD) #[bg=#44475a,fg=#8be9fd]"
    set -g status-right ""
}

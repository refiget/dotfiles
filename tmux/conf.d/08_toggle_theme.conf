# sync input toggle
bind C-g if-shell '[[ $(tmux showw synchronize-panes | cut -d\  -f2) == "on" ]]' \
'setw synchronize-panes off; set -g pane-border-style fg=#{?#{!=:#{environ:TMUX_THEME_COLOR},},#{environ:TMUX_THEME_COLOR},#b294bb}' \
'setw synchronize-panes on; set -g pane-border-style fg=red'

# local mac theme
run-shell "~/.config/tmux/scripts/update_theme_color.sh"
setw -g pane-border-status off
set -g pane-border-style fg=colour244

set -g status-style "bg=#24283b,fg=#c5c8c6"
set -g status-justify 'left'
set -g status-left-length 56
set -g status-right-length 110

set -g @tab_bg "#24283b"
set -g @tab_text "#cdd6f4"
set -g @tab_subtext "#a6adc8"
set -g @tab_overlay "#6c7086"
set -g @tab_active_bg "#46508A"
set -g @status_fg "#6C7086"
set -g @time_fg "#E3F3FF"
set -g @time_bg "#2F4F6B"
set -g @date_fg "#F0E6FF"
set -g @date_bg "#5A476B"
set -g @session_label_fg "#E8ECFF"
set -g @session_label_bg "#3A3F6B"

setw -g window-status-separator '#[fg=#3a414b] │ #[default]'
set -g window-status-style "bg=#24283b"
set -g window-status-current-style "fg=#ffffff,bg=#{@tab_active_bg}"
set -g window-status-last-style 'fg=#{@tab_text},bg=#{@tab_bg}'
setw -g window-status-format '#[fg=#{@tab_overlay}] #I:#[fg=#{@tab_subtext}]#{=10:#{window_name}}#{?window_activity_flag,#[fg=#f9e2af,bold] •#[fg=#{@tab_subtext}],}#{?window_bell_flag,#[fg=#ff5555,bold] !#[fg=#{@tab_subtext}],}#{?window_zoomed_flag,#[fg=#{@theme_color},bold] Z#[fg=#{@tab_subtext}],} '
setw -g window-status-current-format '#[fg=#ffffff,bg=#{@tab_active_bg}]#[bold] #I: #{=10:#{window_name}}#{?window_zoomed_flag, #[bold]Z,} #[default]'

setw -g window-status-activity-style "fg=#f9e2af,bold"
setw -g window-status-bell-style "fg=#ff5555,bold"
# right-side metrics (rainbarf) tuned for current minimalist design language
set-environment -g TMUX_RAINBARF 1
set-environment -g TMUX_RAINBARF_MIN_WIDTH 120
set-environment -g TMUX_RAINBARF_WIDTH 18
set-environment -g TMUX_RAINBARF_SMOOTHING 0.30
# session icon mapping by numeric prefix (1-based)
set-environment -g TMUX_SESSION_ICONS "󰼏,󰼐,󰼑,󰼒,󰼓,󰼔,󰼕,󰼖,󰼗,󰿪"
set-option -g status-left ""
set-option -g status-right "#(~/.config/tmux/tmux-status/right.sh)"

unbind t
unbind T
